services:
  db:
    image: postgres:17-alpine
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noderegistry"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8080
